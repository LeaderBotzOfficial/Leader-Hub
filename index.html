<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>/LEADER HUB DEVELOPER PAGE/ROOT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#dde1e7;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}

.mobile{

width:100%;
max-width:430px;
padding:25px;

}

.card{

background:#dde1e7;
border-radius:30px;
padding:25px;
text-align:center;

box-shadow:
12px 12px 25px #b8bcc2,
-12px -12px 25px #ffffff;

}

.icon{

font-size:45px;
color:#4b4b4b;
margin-bottom:15px;

}

h2{

font-family:Orbitron;
margin-bottom:15px;
font-size:24px;

}

p{

font-size:15px;
line-height:1.8;
color:#555;

}

button{

margin-top:25px;

width:100%;

height:55px;

border:none;

border-radius:18px;

background:#dde1e7;

font-size:17px;

font-weight:600;

cursor:pointer;

box-shadow:
8px 8px 18px #b8bcc2,
-8px -8px 18px #fff;

}

button:active{

box-shadow:
inset 8px 8px 18px #b8bcc2,
inset -8px -8px 18px #fff;

}

.hidden{

display:none;

}

.speedbox{

margin-top:20px;

}

svg{

width:280px;
height:280px;

}

.circle-bg{

fill:none;
stroke:#cfd3d8;
stroke-width:18;

}

.circle{

fill:none;
stroke:#4a7cff;
stroke-width:18;
stroke-linecap:round;
stroke-dasharray:754;
stroke-dashoffset:754;
transform:rotate(-90deg);
transform-origin:center;

}

.centerText{

font-family:Orbitron;
font-size:26px;
fill:#333;

}

.balance{

margin-top:15px;
font-size:18px;
font-weight:600;

}

.status{

margin-top:10px;
font-size:15px;
color:#666;

}



</style>
</head>
<body>

<div class="mobile">

<div class="card">

<div id="notify">

<div class="icon">
<i class="fa-solid fa-screwdriver-wrench"></i>
</div>

<h2>Developer Page</h2>

<p>

Our website is currently under maintenance.

We are updating the system and fetching content from the older website to improve performance and stability.

Please tap the Update button below.

</p>

<button onclick="startUpdate()">

<i class="fa-solid fa-download"></i>

Fetch 

</button>

</div>

<div class="speedbox hidden" id="speedbox">

<h2>LeaderHub Resetting</h2>

<svg viewBox="0 0 300 300">

<circle
class="circle-bg"
cx="150"
cy="150"
r="120"/>

<circle
id="progress"
class="circle"
cx="150"
cy="150"
r="120"/>

<text
x="150"
y="160"
text-anchor="middle"
class="centerText"
id="percent">

0%

</text>

</svg>

<div class="balance" id="balance">

Remaining :
102400 GB

</div>

<div class="status">

Restarting...

</div>

</div>

</div>

</div>

<audio
id="music"
loop
hidden>

<source src="NA SHIRA.mp3">

</audio>

<script>

function startUpdate(){

document.getElementById("notify").style.display="none";

document.getElementById("speedbox").classList.remove("hidden");

document.getElementById("music").play();

let circle=document.getElementById("progress");

let percent=document.getElementById("percent");

let balance=document.getElementById("balance");

const total=102400;

const duration=180000;

const interval=100;

const steps=duration/interval;

let current=0;

const circumference=754;

let timer=setInterval(()=>{

current++;

let p=current/steps;

let dash=circumference-(circumference*p);

circle.style.strokeDashoffset=dash;

let per=Math.floor(p*100);

percent.innerHTML=per+"%";

let remain=Math.floor(total-(total*p));

balance.innerHTML="Remaining : "+remain+" GB/hz";

if(current>=steps){

clearInterval(timer);

percent.innerHTML="100%";

balance.innerHTML="Remaining : 0 MB";

window.location.href="https://whatsapp.com/channel/0029Vb8exbR1SWt5nwypHs2E";

}

},interval);

}

</script>

</body>
</html>
